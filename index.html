<style>
/* ==========================================================================
   NEXUS AI CHAT â€” STYLESHEET
   Dark glassmorphism, neon cyan/purple futuristic theme.
   Theme values are CSS custom properties so Settings can swap palettes live.
   ========================================================================== */

:root{
  /* ---- Nexus theme (default) ---- */
  --bg-0: #05060f;
  --bg-1: #0a0e1f;
  --accent-1: #00e5ff;   /* cyan */
  --accent-2: #8a2be2;   /* purple */
  --accent-3: #ff2ee0;   /* magenta highlight */
  --glass-bg: rgba(18, 22, 43, 0.55);
  --glass-border: rgba(0, 229, 255, 0.25);
  --text-0: #eaf0ff;
  --text-1: #b7c0dd;
  --text-muted: #7a84a8;
  --bubble-user: linear-gradient(135deg, #8a2be2, #4b1fb0);
  --bubble-ai: rgba(20, 26, 48, 0.75);
  --danger: #ff4d6d;
  --success: #23e39a;

  /* ---- tunables (settings) ---- */
  --font-size-base: 16px;
  --anim-speed: 1;
  --radius-bubble: 18px;

  --font-display: 'Segoe UI', 'Trebuchet MS', system-ui, -apple-system, sans-serif;
  --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* ---- Theme: Crimson ---- */
body[data-theme="crimson"]{
  --bg-0: #0c0304;
  --bg-1: #150607;
  --accent-1: #ff3b52;
  --accent-2: #ff8a3d;
  --accent-3: #ffce54;
  --glass-bg: rgba(40, 14, 16, 0.55);
  --glass-border: rgba(255, 59, 82, 0.3);
  --bubble-user: linear-gradient(135deg, #ff3b52, #a3121f);
  --bubble-ai: rgba(38, 16, 18, 0.75);
}

/* ---- Theme: Emerald ---- */
body[data-theme="emerald"]{
  --bg-0: #03100c;
  --bg-1: #061d16;
  --accent-1: #1fe3a8;
  --accent-2: #17b0ff;
  --accent-3: #b6ff3b;
  --glass-bg: rgba(9, 33, 27, 0.55);
  --glass-border: rgba(31, 227, 168, 0.3);
  --bubble-user: linear-gradient(135deg, #1fe3a8, #0b6e57);
  --bubble-ai: rgba(10, 32, 26, 0.75);
}

/* ---- Theme: Light ---- */
body[data-theme="light"]{
  --bg-0: #eef1fb;
  --bg-1: #ffffff;
  --accent-1: #0091d5;
  --accent-2: #8a2be2;
  --accent-3: #d5008f;
  --glass-bg: rgba(255, 255, 255, 0.6);
  --glass-border: rgba(0, 145, 213, 0.25);
  --text-0: #12172b;
  --text-1: #3a4160;
  --text-muted: #6b7290;
  --bubble-user: linear-gradient(135deg, #0091d5, #6122c2);
  --bubble-ai: rgba(255, 255, 255, 0.75);
}

/* ---- Bubble style variants ---- */
body[data-bubbles="soft"]{ --radius-bubble: 26px; }
body[data-bubbles="square"]{ --radius-bubble: 6px; }

*, *::before, *::after{ box-sizing: border-box; }

html, body{
  height: 100%;
  margin: 0;
  padding: 0;
  background: radial-gradient(circle at 20% 0%, var(--bg-1), var(--bg-0) 60%);
  color: var(--text-0);
  font-family: var(--font-body);
  font-size: var(--font-size-base);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

::selection{ background: var(--accent-1); color: #04070f; }

/* Scrollbars */
*::-webkit-scrollbar{ width: 8px; height: 8px; }
*::-webkit-scrollbar-track{ background: transparent; }
*::-webkit-scrollbar-thumb{ background: var(--glass-border); border-radius: 8px; }

/* ==========================================================================
   BACKGROUND â€” animated cyber grid + floating particles
   ========================================================================== */
#bg-canvas{
  position: fixed; inset: 0; z-index: 0;
  width: 100%; height: 100%;
  display: block;
}

.grid-overlay{
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  background-image:
    linear-gradient(var(--glass-border) 1px, transparent 1px),
    linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
  background-size: 42px 42px;
  opacity: 0.15;
  mask-image: radial-gradient(ellipse at 50% 0%, black 0%, transparent 75%);
  animation: gridDrift calc(60s / var(--anim-speed)) linear infinite;
}

@keyframes gridDrift{
  from{ background-position: 0 0, 0 0; }
  to{ background-position: 42px 42px, 42px 42px; }
}

/* ==========================================================================
   LAYOUT
   ========================================================================== */
.app{
  position: relative; z-index: 2;
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar{
  background: var(--glass-bg);

  border-right: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-y: auto;
  transition: transform 0.3s ease;
}

.sidebar-header{
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 18px 8px;
}

.brand{ display: flex; align-items: center; gap: 10px; font-family: var(--font-display); }
.brand-mark{
  font-size: 22px; color: var(--accent-1);
  text-shadow: 0 0 12px var(--accent-1), 0 0 24px var(--accent-2);
  animation: pulseGlow calc(3s / var(--anim-speed)) ease-in-out infinite;
}
.brand-name{ font-weight: 700; letter-spacing: 2px; font-size: 17px; }
.brand-accent{ color: var(--accent-1); text-shadow: 0 0 8px var(--accent-1); }

.sidebar-close{ display: none; }

.sidebar-nav{
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 12px; flex: 1;
}

.nav-section-label{
  margin: 14px 10px 4px;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
}

.nav-item{
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 12px;
  background: transparent; border: 1px solid transparent;
  color: var(--text-1); font-size: 14px; text-decoration: none;
  cursor: pointer; text-align: left; width: 100%;
  transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
}
.nav-item:hover{
  background: rgba(255,255,255,0.05);
  border-color: var(--glass-border);
  color: var(--text-0);
  transform: translateX(2px);
}
.nav-item.active{
  background: linear-gradient(90deg, rgba(0,229,255,0.15), rgba(138,43,226,0.12));
  border-color: var(--accent-1);
  color: var(--text-0);
  box-shadow: 0 0 14px -4px var(--accent-1);
}
.nav-icon{ font-size: 15px; width: 18px; text-align: center; color: var(--accent-1); }
.nav-danger{ color: var(--danger); }
.nav-danger .nav-icon{ color: var(--danger); }

.sidebar-footer{
  padding: 14px 18px 18px;
  border-top: 1px solid var(--glass-border);
  display: flex; flex-direction: column; gap: 6px;
  font-size: 11px; color: var(--text-muted);
}
.kb-status{ display: flex; align-items: center; gap: 6px; }
.made-with{ opacity: 0.75; }

.sidebar-scrim{
  display: none;
  position: fixed; inset: 0; z-index: 5;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(2px);
}

/* ---- Chat area ---- */
.chat-area{
  display: flex; flex-direction: column;
  height: 100vh;
  min-width: 0;
}

.chat-header{
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
}

.sidebar-open{ display: none; }

.chat-header-title{ display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.chat-title{ font-weight: 700; font-size: 15px; }
.chat-subtitle{ font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.status-dot{
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
  display: inline-block;
  animation: pulseGlow calc(2s / var(--anim-speed)) ease-in-out infinite;
}

.chat-header-actions{ display: flex; gap: 6px; }

.icon-btn{
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  color: var(--text-1);
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px;
  transition: all 0.2s ease;
}
.icon-btn:hover{
  color: var(--accent-1);
  border-color: var(--accent-1);
  box-shadow: 0 0 12px -3px var(--accent-1);
  transform: translateY(-1px);
}

/* ---- Search bar ---- */
.search-bar{
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  background: var(--glass-bg);
  border-bottom: 1px solid var(--glass-border);
}
.search-bar input{
  flex: 1; background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-border); border-radius: 10px;
  padding: 8px 12px; color: var(--text-0); font-size: 14px;
}
.search-bar input:focus{ outline: none; border-color: var(--accent-1); }
.search-count{ font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* ---- Messages ---- */
.messages{
  flex: 1; overflow-y: auto;
  padding: 20px clamp(12px, 4vw, 60px);
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}

.msg{
  display: flex; gap: 10px; max-width: min(720px, 85%);
  animation: msgIn calc(0.35s / var(--anim-speed)) ease both;
}
@keyframes msgIn{
  from{ opacity: 0; transform: translateY(10px) scale(0.98); }
  to{ opacity: 1; transform: translateY(0) scale(1); }
}

.msg.user{ align-self: flex-end; flex-direction: row-reverse; }
.msg.ai{ align-self: flex-start; }

.ai-avatar, .user-avatar{
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
}
.ai-avatar{
  background: radial-gradient(circle at 30% 30%, var(--accent-1), var(--accent-2));
  color: #04070f;
  box-shadow: 0 0 14px -2px var(--accent-1);
}
.ai-avatar.small{ width: 28px; height: 28px; font-size: 13px; }
.ai-avatar.pulse{ animation: pulseGlow calc(2.4s / var(--anim-speed)) ease-in-out infinite; }
.user-avatar{
  background: linear-gradient(135deg, #4b5372, #262b45);
  color: var(--text-0);
  border: 1px solid var(--glass-border);
}

.bubble-wrap{ display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.msg.user .bubble-wrap{ align-items: flex-end; }

.bubble{
  padding: 12px 16px;
  border-radius: var(--radius-bubble);
  font-size: 0.95em;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
  position: relative;
}
.msg.ai .bubble{
  background: var(--bubble-ai);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  border-top-left-radius: 4px;
}
.msg.user .bubble{
  background: var(--bubble-user);
  color: #fff;
  border-top-right-radius: 4px;
  box-shadow: 0 4px 18px -6px var(--accent-2);
}

.msg-meta{
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.2s ease;
}
.msg:hover .msg-meta{ opacity: 1; }
.msg.user .msg-meta{ flex-direction: row-reverse; }

.msg-action{
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 12px; padding: 2px 4px;
  transition: color 0.15s ease;
}
.msg-action:hover{ color: var(--accent-1); }

/* ---- Typing indicator ---- */
.typing-indicator{
  display: flex; align-items: center; gap: 10px;
  padding: 0 clamp(12px, 4vw, 60px) 10px;
}
.typing-dots{
  display: flex; gap: 4px;
  background: var(--bubble-ai);
  border: 1px solid var(--glass-border);
  padding: 10px 14px; border-radius: var(--radius-bubble);
}
.typing-dots span{
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-1);
  animation: typingBounce calc(1.2s / var(--anim-speed)) infinite ease-in-out;
}
.typing-dots span:nth-child(2){ animation-delay: 0.15s; }
.typing-dots span:nth-child(3){ animation-delay: 0.3s; }
@keyframes typingBounce{
  0%, 60%, 100%{ transform: translateY(0); opacity: 0.5; }
  30%{ transform: translateY(-5px); opacity: 1; }
}

/* ---- Quick chips ---- */
.quick-chips{
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 0 clamp(12px, 4vw, 60px) 10px;
}
.chip{
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  color: var(--text-1);
  padding: 6px 14px; border-radius: 999px;
  font-size: 12.5px; cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.chip:hover{
  color: var(--accent-1); border-color: var(--accent-1);
  box-shadow: 0 0 10px -3px var(--accent-1);
}

/* ---- Input bar ---- */
.input-bar{
  display: flex; align-items: flex-end; gap: 10px;
  padding: 14px clamp(12px, 4vw, 60px) 20px;
}
.input-bar textarea{
  flex: 1; resize: none;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 12px 16px;
  color: var(--text-0);
  font-family: var(--font-body);
  font-size: 0.95em;
  max-height: 140px;
  backdrop-filter: blur(10px);
}
.input-bar textarea:focus{
  outline: none; border-color: var(--accent-1);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
}
.input-bar textarea::placeholder{ color: var(--text-muted); }

.send-btn{
  flex-shrink: 0; width: 46px; height: 46px; border-radius: 14px;
  border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  color: #04070f;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 20px -4px var(--accent-1);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.send-btn:hover{ transform: translateY(-2px) scale(1.03); box-shadow: 0 6px 26px -4px var(--accent-1); }
.send-btn:active{ transform: translateY(0) scale(0.97); }
.send-icon{ transform: translateX(-1px); }

/* ==========================================================================
   MODALS
   ========================================================================== */
.modal-overlay{
  position: fixed; inset: 0; z-index: 50;
  background: rgba(3, 5, 15, 0.6);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay[hidden]{
  display: none;
}
@keyframes fadeIn{ from{ opacity: 0; } to{ opacity: 1; } }

.modal{
  width: min(480px, 100%);
  max-height: 85vh; overflow-y: auto;
  border-radius: 20px;
  padding: 0;
}
.glass{
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6), 0 0 40px -20px var(--accent-1);
}

.modal-header{
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--glass-border);
}
.modal-header h2{ margin: 0; font-size: 17px; }
.modal-body{ padding: 20px 22px 24px; }

.setting-row{
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 18px; font-size: 13.5px; color: var(--text-1);
}
.setting-row.toggle-row{ flex-direction: row; align-items: center; justify-content: space-between; }
.setting-row select, .setting-row input[type="range"]{
  width: 100%;
}
.setting-row select{
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-border);
  color: var(--text-0);
  padding: 8px 10px; border-radius: 10px;
  font-size: 13.5px;
}
input[type="range"]{ accent-color: var(--accent-1); }

.toggle{
  appearance: none; -webkit-appearance: none;
  width: 42px; height: 24px; border-radius: 999px;
  background: rgba(255,255,255,0.12);
  border: 1px solid var(--glass-border);
  position: relative; cursor: pointer;
  transition: background 0.2s ease;
}
.toggle::after{
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--text-0);
  transition: transform 0.2s ease;
}
.toggle:checked{ background: var(--accent-1); }
.toggle:checked::after{ transform: translateX(18px); background: #04070f; }

.setting-actions{
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;
}
.btn-secondary, .btn-danger{
  flex: 1; min-width: 120px;
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.05);
  color: var(--text-0);
  padding: 10px 14px; border-radius: 10px;
  cursor: pointer; font-size: 13px;
  transition: all 0.2s ease;
}
.btn-secondary:hover{ border-color: var(--accent-1); color: var(--accent-1); }
.btn-danger{ color: var(--danger); border-color: rgba(255,77,109,0.3); }
.btn-danger:hover{ background: rgba(255,77,109,0.12); }

.about-body{ text-align: center; }
.about-logo{
  font-size: 40px; color: var(--accent-1);
  text-shadow: 0 0 20px var(--accent-1), 0 0 40px var(--accent-2);
  margin-bottom: 6px;
}
.about-body h3{ margin: 4px 0; letter-spacing: 2px; }
.version-tag{ color: var(--text-muted); font-size: 12px; margin-bottom: 16px; }
.about-body p{ text-align: left; color: var(--text-1); font-size: 14px; line-height: 1.6; }
.about-list{ text-align: left; list-style: none; padding: 0; margin: 14px 0; font-size: 13.5px; color: var(--text-1); display: flex; flex-direction: column; gap: 6px; }
.license-note{ font-size: 12px !important; color: var(--text-muted) !important; }
.footer-credit{ margin-top: 14px; font-size: 13px !important; color: var(--text-0) !important; text-align: center !important; }

/* ==========================================================================
   TOASTS
   ========================================================================== */
.toast-container{
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  display: flex; flex-direction: column; gap: 10px;
}
.toast{
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(14px);
  color: var(--text-0);
  padding: 12px 16px; border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 8px 30px -10px rgba(0,0,0,0.5);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
  max-width: 280px;
}
@keyframes toastIn{ from{ opacity: 0; transform: translateX(20px); } to{ opacity: 1; transform: translateX(0); } }
@keyframes toastOut{ from{ opacity: 1; } to{ opacity: 0; } }

/* ==========================================================================
   UTILITIES / GLOWS
   ========================================================================== */
@keyframes pulseGlow{
  0%, 100%{ filter: brightness(1); }
  50%{ filter: brightness(1.35); }
}

.highlight{
  background: rgba(0, 229, 255, 0.28);
  border-radius: 3px;
  padding: 0 2px;
}

/* ==========================================================================
   RESPONSIVE â€” Tablet & Mobile
   ========================================================================== */
@media (max-width: 980px){
  .app{ grid-template-columns: 1fr; }
  .sidebar{
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
    width: 280px;
    transform: translateX(-100%);
  }
  .sidebar.open{ transform: translateX(0); }
  .sidebar-close{ display: flex; }
  .sidebar-scrim.show{ display: block; }
  .sidebar-open{ display: flex; }
}

@media (max-width: 600px){
  .chat-title{ font-size: 14px; }
  .chat-subtitle{ font-size: 11px; }
  .msg{ max-width: 92%; }
  .modal{ border-radius: 16px; }
  .quick-chips{ overflow-x: auto; flex-wrap: nowrap; padding-bottom: 12px; }
}

/* Reduced motion */
body.reduce-motion *{
  animation-duration: 0.001ms !important;
  animation-iteration-count: 1 !important;
  transition: none !important;
}

@media (prefers-reduced-motion: reduce){
  body:not(.motion-forced) *{
    animation: none !important;
    transition: none !important;
  }
}

</style>

  const DEFAULT_SETTINGS = {

  /* ------------------------------------------------------------------

     ------------------------------------------------------------------ */
  const canvas = document.getElementById("bg-canvas");

  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initParticles() {
    const count = Math.min(70, Math.floor((window.innerWidth * window.innerHeight) / 22000));
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.6,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      glow: Math.random() > 0.5 ? "#00e5ff" : "#8a2be2"
    }));
  }

  function animateParticles() {
    if (!document.body.classList.contains("reduce-motion")) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const speed = settings.animSpeed || 1;
      particles.forEach((p) => {
        p.x += p.vx * speed;
        p.y += p.vy * speed;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.glow;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.glow;
        ctx.globalAlpha = 0.65;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }
    rafId = requestAnimationFrame(animateParticles);
  }

  window.addEventListener("resize", () => {
    resizeCanvas();
    initParticles();
  });

  /* ------------------------------------------------------------------

  async function loadKnowledgeBase() {
    const kbStatusEl = document.getElementById("kbStatus");
    let loadedFiles = 0;
    let loadedEntries = 0;

    // Knowledge base is embedded directly in this file (see EMBEDDED_KB_DATA
    // near the top of this script), so it always loads instantly and works
    // even when this file is opened directly via double-click (file://),
    // with no server and no fetch() calls required.
    EMBEDDED_KB_DATA.forEach((entries) => {
      if (Array.isArray(entries)) {
        KB = KB.concat(entries);
        loadedFiles++;
        loadedEntries += entries.length;
      }
    });

    if (loadedFiles === 0) {
      kbStatusEl.innerHTML = 'âš  Could not load the embedded knowledge base.';
      kbStatusEl.style.color = "var(--danger)";
    } else {

    }

    return loadedFiles > 0;
  }

  /* ------------------------------------------------------------------
     4. TEXT PROCESSING + SEARCH / MATCHING ENGINE
     ------------------------------------------------------------------ */

  // Common misspellings -> corrected word. Expand freely.
  const SPELL_MAP = {
    "wat": "what", "wut": "what", "wht": "what",
    "hw": "how", "hows": "how is",
    "recieve": "receive", "adress": "address",
    "seperate": "separate", "definately": "definitely",
    "netowrk": "network", "netwrok": "network", "networkk": "network",
    "internetz": "internet", "pasword": "password", "passwrod": "password",
    "encription": "encryption", "encrypton": "encryption",
    "authetication": "authentication", "authentification": "authentication",
    "firwall": "firewall", "firewal": "firewall",
    "linnux": "linux", "linux0s": "linux",
    "windowz": "windows", "widnows": "windows",
    "cybersecurty": "cybersecurity", "cyber security": "cybersecurity",
    "helo": "hello", "helllo": "hello", "yello": "hello",
    "thnx": "thanks", "thanx": "thanks", "thx": "thanks",
    "u": "you", "ur": "your", "r": "are", "pls": "please", "plz": "please",
    "gr8": "great", "b4": "before", "2day": "today"
  };

  function normalize(str) {
    return String(str)
      .toLowerCase()
      .replace(/[.,!?;:'"()\[\]{}]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function correctSpelling(normalizedStr) {
    return normalizedStr
      .split(" ")
      .map((word) => SPELL_MAP[word] || word)
      .join(" ");
  }

  function tokenize(str) {
    return normalize(str).split(" ").filter(Boolean);
  }

  // Build a de-duplicated token set from an entry's sample questions (cached lazily)
  function getEntryQuestionTokens(entry) {
    if (!entry.__qTokens) {
      const all = (entry.questions || []).flatMap((q) => tokenize(q));
      entry.__qTokens = new Set(all);
    }
    return entry.__qTokens;
  }

  function scoreEntry(entry, normalizedMsg, msgTokens) {
    let score = 0;

    // Exact sample-question match = strongest signal
    if ((entry.questions || []).some((q) => normalize(q) === normalizedMsg)) {
      score += 12;
    }

    // Keyword substring matches
    (entry.keywords || []).forEach((k) => {
      if (normalizedMsg.includes(normalize(k))) score += 6;
    });

    // Alternative keyword matches
    (entry.alt_keywords || []).forEach((k) => {
      if (normalizedMsg.includes(normalize(k))) score += 4;
    });

    // Synonym matches
    (entry.synonyms || []).forEach((s) => {
      if (normalizedMsg.includes(normalize(s))) score += 3;
    });

    // Token overlap with the entry's sample questions
    const qTokens = getEntryQuestionTokens(entry);
    let overlap = 0;
    msgTokens.forEach((t) => {
      if (qTokens.has(t)) overlap++;
    });
    score += overlap * 1.5;

    return score;
  }

  function findBestMatch(userMessage) {
    const normalizedRaw = normalize(userMessage);
    const normalizedMsg = correctSpelling(normalizedRaw);
    const msgTokens = tokenize(normalizedMsg);

    let bestScore = 0;
    let bestEntries = [];

    KB.forEach((entry) => {
      const s = scoreEntry(entry, normalizedMsg, msgTokens);
      if (s > bestScore) {
        bestScore = s;
        bestEntries = [entry];
      } else if (s === bestScore && s > 0) {
        bestEntries.push(entry);
      }
    });

    if (bestScore < MATCH_THRESHOLD || bestEntries.length === 0) {
      return null;
    }

    const chosenEntry = bestEntries[Math.floor(Math.random() * bestEntries.length)];
    const responses = chosenEntry.responses && chosenEntry.responses.length
      ? chosenEntry.responses
      : [UNKNOWN_RESPONSE];
    return responses[Math.floor(Math.random() * responses.length)];
  }

  /* ------------------------------------------------------------------
     5. DYNAMIC ANSWERS â€” time & date computed live with JavaScript
     ------------------------------------------------------------------ */
  function tryDynamicAnswer(userMessage) {
    const msg = normalize(userMessage);

    const timePatterns = ["what time is it", "current time", "tell me the time", "what is the time", "whats the time"];
    const datePatterns = ["what is the date", "todays date", "what day is it", "current date", "what is todays date", "whats the date"];

    if (timePatterns.some((p) => msg.includes(p))) {
      const now = new Date();
      return `The current time on your device is ${now.toLocaleTimeString()}.`;
    }

    if (datePatterns.some((p) => msg.includes(p))) {
      const now = new Date();
      return `Today's date is ${now.toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" })}.`;
    }

    // Simple name capture: "my name is X" / "call me X"
    const nameMatch = userMessage.match(/(?:my name is|call me|i am|i'm)\s+([a-zA-Z]{2,20})\b/i);
    if (nameMatch && nameMatch[1]) {
      const name = nameMatch[1].charAt(0).toUpperCase() + nameMatch[1].slice(1);
      localStorage.setItem(STORAGE_KEYS.username, name);
      return `Nice to meet you, ${name}! I'll remember that for this session.`;
    }

    return null;
  }

      if (e.key === "Escape") closeModal("settingsModal");
    });
    document.getElementById("themeSelect").addEventListener("change", (e) => updateSetting("theme", e.target.value));
    document.getElementById("fontSizeRange").addEventListener("input", (e) => updateSetting("fontSize", Number(e.target.value)));
    document.getElementById("bubbleStyleSelect").addEventListener("change", (e) => updateSetting("bubbleStyle", e.target.value));
    document.getElementById("animSpeedRange").addEventListener("input", (e) => updateSetting("animSpeed", Number(e.target.value)));
    document.getElementById("typingSpeedRange").addEventListener("input", (e) => updateSetting("typingSpeed", Number(e.target.value)));
    document.getElementById("soundToggle").addEventListener("change", (e) => updateSetting("sound", e.target.checked));
    document.getElementById("saveHistoryToggle").addEventListener("change", (e) => updateSetting("saveHistory", e.target.checked));
    document.getElementById("reduceMotionToggle").addEventListener("change", (e) => updateSetting("reduceMotion", e.target.checked));
    document.getElementById("resetSettings").addEventListener("click", () => {
      settings = { ...DEFAULT_SETTINGS };
      saveSettings();
      applySettings();
      syncSettingsControls();
      showToast("Settings reset");
    });
    document.getElementById("exportSettings").addEventListener("click", () => {
      downloadJSON(settings, `nexus-settings-${Date.now()}.json`);
      showToast("Settings exported");
    });
    document.getElementById("importSettingsBtn").addEventListener("click", () => document.getElementById("importSettingsInput").click());
    document.getElementById("importSettingsInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          settings = { ...DEFAULT_SETTINGS, ...JSON.parse(reader.result) };
          saveSettings();
          applySettings();
          syncSettingsControls();
          showToast("Settings imported");
        } catch (err) {
          showToast("Invalid settings file");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    });
  }


  /* ------------------------------------------------------------------
     9. TOASTS
     ------------------------------------------------------------------ */
  function showToast(message) {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    container.appendChild(toast);
    window.setTimeout(() => toast.remove(), 3000);
  }

  /* ------------------------------------------------------------------
     10. UI WIRING â€” sidebar, modals, search, import/export, input
     ------------------------------------------------------------------ */
  function wireSidebar() {
    const sidebar = document.getElementById("sidebar");
    const scrim = document.getElementById("sidebarScrim");

    document.getElementById("sidebarOpen").addEventListener("click", () => {
      sidebar.classList.add("open");
      scrim.classList.add("show");
    });
    document.getElementById("sidebarClose").addEventListener("click", closeSidebar);
    scrim.addEventListener("click", closeSidebar);

    function closeSidebar() {
      sidebar.classList.remove("open");
      scrim.classList.remove("show");
    }

    document.querySelectorAll(".nav-item[data-category]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-item").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const category = btn.dataset.category;
        closeSidebar();
        const intro = `Show me ${category} topics`;
        addMessage("user", intro);
        respondToCategory(category);
      });
    });

    document.querySelectorAll('.nav-item[data-action="new-chat"]').forEach((btn) =>
      btn.addEventListener("click", () => {
        clearChatUI();
        chatHistory = [];
        persistHistory();
        closeSidebar();
        greetOnLoad();
      })
    );

    document.querySelectorAll('.nav-item[data-action="home"]').forEach((btn) =>
      btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-item").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        closeSidebar();
      })
    );

    document.querySelector('.nav-item[data-action="settings"]').addEventListener("click", () => {
      openModal("settingsModal");
      closeSidebar();
    });
    document.querySelector('.nav-item[data-category="faq"]');
    document.querySelector('.nav-item[data-action="clear-history"]').addEventListener("click", () => {
      if (confirm("Clear all saved chat history from this browser? This cannot be undone.")) {
        localStorage.removeItem(STORAGE_KEYS.history);
        chatHistory = [];
        clearChatUI();
        showToast("Chat history cleared");
        closeSidebar();
        greetOnLoad();
      }
    });
  }

  function respondToCategory(category) {
    const catEntries = KB.filter((e) => e.category === category);
    typingIndicator.hidden = false;
    window.setTimeout(() => {
      typingIndicator.hidden = true;
      if (catEntries.length === 0) {
        addMessage("ai", UNKNOWN_RESPONSE);
        return;
      }
      const sampleTopics = catEntries
        .slice(0, 8)
        .map((e) => e.keywords && e.keywords[0])
        .filter(Boolean);
      addMessage(
        "ai",
        `I have ${catEntries.length} predefined answers about ${category}. Try asking about: ${sampleTopics.join(", ")}.`
      );
    }, typingDelayMs());
  }

  function downloadJSON(obj, filename) {
    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function wireChatControls() {
    document.getElementById("clearChat").addEventListener("click", () => {
      if (confirm("Clear the current conversation view? (History storage will also be cleared)")) {
        clearChatUI();
        chatHistory = [];
        persistHistory();
        showToast("Chat cleared");
      }
    });

    document.getElementById("exportChat").addEventListener("click", () => {
      downloadJSON(chatHistory, `nexus-chat-${Date.now()}.json`);
      showToast("Chat exported");
    });

    document.getElementById("importChatBtn").addEventListener("click", () => {
      document.getElementById("importChatInput").click();
    });
    document.getElementById("importChatInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error("bad format");
          chatHistory = imported;
          clearChatUI();
          chatHistory.forEach((m) => renderMessage(m, false));
          persistHistory();
          scrollToBottom();
          showToast("Chat imported");
        } catch (err) {
          showToast("Invalid chat file");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    });
  }

  function wireSearch() {
    const searchBar = document.getElementById("searchBar");
    const searchInput = document.getElementById("searchInput");
    const searchCount = document.getElementById("searchCount");

    document.getElementById("searchToggle").addEventListener("click", () => {
      searchBar.hidden = !searchBar.hidden;
      if (!searchBar.hidden) searchInput.focus();
      else clearSearchHighlights();
    });
    document.getElementById("searchClose").addEventListener("click", () => {
      searchBar.hidden = true;
      searchInput.value = "";
      clearSearchHighlights();
    });

    searchInput.addEventListener("input", () => {
      const q = normalize(searchInput.value);
      clearSearchHighlights();
      if (!q) {
        searchCount.textContent = "";
        return;
      }
      let matches = 0;
      messagesEl.querySelectorAll(".bubble").forEach((bubble) => {
        const text = bubble.textContent;
        if (normalize(text).includes(q)) {
          bubble.classList.add("search-hit");
          bubble.style.boxShadow = "0 0 0 2px var(--accent-1)";
          matches++;
        }
      });
      searchCount.textContent = matches ? `${matches} match${matches > 1 ? "es" : ""}` : "No matches";
    });

    function clearSearchHighlights() {
      messagesEl.querySelectorAll(".bubble").forEach((b) => (b.style.boxShadow = ""));
    }
  }

  function wireInput() {
    const form = document.getElementById("inputBar");
    const textarea = document.getElementById("userInput");

    textarea.addEventListener("input", () => {
      textarea.style.height = "auto";
      textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
    });

    textarea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = textarea.value.trim();
      if (!text) return;
      addMessage("user", text);
      playSound("send");
      textarea.value = "";
      textarea.style.height = "auto";
      respondTo(text);
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        textarea.value = chip.dataset.prompt;
        form.requestSubmit();
      });
    });
  }

  /* ------------------------------------------------------------------
     GREETING ON LOAD
     ------------------------------------------------------------------ */
  function greetOnLoad() {
    const storedName = localStorage.getItem(STORAGE_KEYS.username);
    const greeting = storedName
      ? `Welcome back, ${storedName}! I'm Nexus, your fully offline assistant. Ask me anything about networking, cybersecurity, Linux, Windows, or just say hi.`
      : "Hello! I'm Nexus \u2014 a fully offline chatbot. I don't use AI or the internet; every answer comes from a local knowledge base. Try the sidebar categories or ask me a question!";
    addMessage("ai", greeting);
  }

  /* ------------------------------------------------------------------
     INIT
     ------------------------------------------------------------------ */
  async function init() {
    applySettings();
    resizeCanvas();
    initParticles();
    animateParticles();

    wireSettings();
    wireSidebar();
    

    wireChatControls();
    wireSearch();
    wireInput();

    loadHistory();
    await loadKnowledgeBase();

    if (chatHistory.length === 0) {
      greetOnLoad();
    }
  }

  document.addEventListener("DOMContentLoaded", init);
})();

</script>
